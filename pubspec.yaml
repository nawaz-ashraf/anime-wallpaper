name: anime_verse_4k
description: AnimeVerse 4K - Premium Anime Wallpaper Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # UI & Animations
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  animations: ^2.0.11
  smooth_page_indicator: ^1.1.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Download & Permissions
  permission_handler: ^11.2.0
  image_gallery_saver: ^2.0.3

  # Share
  share_plus: ^7.2.1

  # Ads
  google_mobile_ads: ^5.3.0

  # Other
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  path_provider: ^2.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/logo/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/animations/
    - assets/privacy_policy.html
    - assets/wallpapers/anime/
    - assets/wallpapers/naruto/
    - assets/wallpapers/one_piece/
    - assets/wallpapers/demon_slayer/
    - assets/wallpapers/solo_leveling/
    - assets/wallpapers/jjk/
    - assets/wallpapers/attack_on_titan/
    - assets/wallpapers/chainsaw_man/
    - assets/wallpapers/dragon_ball/
    - assets/wallpapers/cyberpunk/
    - assets/wallpapers/gaming/
    - assets/wallpapers/cars/
    - assets/wallpapers/nature/
    - assets/wallpapers/amoled/
    - assets/wallpapers/neon/
    - assets/wallpapers/abstract/
    - assets/wallpapers/minimal/
